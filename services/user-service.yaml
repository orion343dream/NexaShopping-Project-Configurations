spring:
  mvc:
    problemdetails:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/db-nexashopping
    username: postgres
    password: psqlAdmin123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

servlet:
  multipart:
    enabled: true
    max-file-size: 5MB
    max-request-size: 10MB

server:
  port: 0
  forward-headers-strategy: framework

  eureka:
  instance:
    instance-id: ${spring.application.name}:${random.value}
    prefer-ip-address: true

app:
  storage:
    path: ${user.home}/.ijse/eca/students
